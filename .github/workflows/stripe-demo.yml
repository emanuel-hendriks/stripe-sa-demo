name: Stripe Demo Flow

on:
  workflow_dispatch:

jobs:
  demo:
    runs-on: ubuntu-latest
    env:
      STRIPE_DEMO_KEY: ${{ secrets.STRIPE_TEST_KEY }}
      RESTAURANT_ACCT: ${{ secrets.RESTAURANT_ACCT }}
      COURIER_ACCT: ${{ secrets.COURIER_ACCT }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - name: Run demo (pay, transfer, verify)
        run: bash ci/run-demo.sh
